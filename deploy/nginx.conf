# /etc/nginx/sites-available/taxapp
# Symlink to /etc/nginx/sites-enabled/taxapp

upstream taxapp_backend {
    server 127.0.0.1:8003;
}

# fileextension.taxrefundloan.us
server {
    listen 80;
    server_name fileextension.taxrefundloan.us;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name fileextension.taxrefundloan.us;

    ssl_certificate     /etc/letsencrypt/live/fileextension.taxrefundloan.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fileextension.taxrefundloan.us/privkey.pem;

    root /opt/taxapp/frontend-extension/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://taxapp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

