# fileextension.taxrefundloan.us
server {
    listen 80;
    server_name fileextension.taxrefundloan.us;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name fileextension.taxrefundloan.us;

    ssl_certificate /etc/letsencrypt/live/fileextension.taxrefundloan.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fileextension.taxrefundloan.us/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /opt/taxapp/frontend-extension/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

