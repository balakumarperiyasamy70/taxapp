# taxrefundloan.us — main homepage
server {
    listen 80;
    server_name taxrefundloan.us www.taxrefundloan.us;
    return 301 https://taxrefundloan.us$request_uri;
}
server {
    listen 443 ssl http2;
    server_name taxrefundloan.us www.taxrefundloan.us;

    ssl_certificate /etc/letsencrypt/live/fileextension.taxrefundloan.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fileextension.taxrefundloan.us/privkey.pem;
    include /etc/nginx/templates/misc.tmpl;

    root /var/taxapp;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# fileextension.taxrefundloan.us
server {
    listen 80;
    server_name fileextension.taxrefundloan.us;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name fileextension.taxrefundloan.us;

    ssl_certificate /etc/letsencrypt/live/fileextension.taxrefundloan.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fileextension.taxrefundloan.us/privkey.pem;
    include /etc/nginx/templates/misc.tmpl;

    client_max_body_size 10M;

    root /opt/taxapp/frontend-extension/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

